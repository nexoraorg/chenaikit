version: '3.8'

services:
  # Jaeger All-in-One: single binary with all components (agent, collector, query, UI)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: chenaikit-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENCODING=protobuf
      - METRICS_STORAGE_TYPE=prometheus
      - PROMETHEUS_SERVER_URL=http://prometheus:9090
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_KEY=/badger/data
      - BADGER_DIRECTORY_VALUE=/badger/data
    ports:
      - "16686:16686"     # Jaeger UI
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
      - "14250:14250"     # collector gRPC
      - "14268:14268"     # collector HTTP
      - "14269:14269"     # admin port
      - "9411:9411"       # Zipkin collector
      - "6831:6831/udp"   # Jaeger agent compact
      - "6832:6832/udp"   # Jaeger agent binary
      - "5778:5778"       # Jaeger agent config
    volumes:
      - jaeger_badger:/badger
    networks:
      - chenaikit-tracing
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:14269"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # OpenTelemetry Collector (optional, for more complex routing)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: chenaikit-otel-collector
    command:
      - "--config=/etc/otel-collector-config.yaml"
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "8888:8888"     # Prometheus metrics
      - "8889:8889"     # Prometheus exporter
    depends_on:
      jaeger:
        condition: service_healthy
    networks:
      - chenaikit-tracing
    restart: unless-stopped

  # Prometheus for metrics storage (used by Jaeger)
  prometheus:
    image: prom/prometheus:latest
    container_name: chenaikit-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - chenaikit-tracing
    restart: unless-stopped

volumes:
  jaeger_badger:
  prometheus_data:

networks:
  chenaikit-tracing:
    driver: bridge